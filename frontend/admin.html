<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURORA SECURE ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-header { padding: 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .btn { padding: 8px 16px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: 600; border-radius: 4px; text-decoration: none; }
        .btn-danger { background: #ff4d4d; color: #fff; }
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        pre { background: #000; padding: 15px; border-radius: 6px; overflow-x: auto; color: #0f0; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🛡️ AURORA ADMIN DASHBOARD</h1>
        <div>
            <a href="/" class="btn">Back to App</a>
            <button id="admin-logout" class="btn btn-danger">Secure Logout</button>
        </div>
    </div>
    
    <div class="container" id="admin-content" style="display: none;">
        <div class="grid">
            <div class="card">
                <h2>System Status</h2>
                <pre id="system-status">Loading...</pre>
            </div>
            <div class="card">
                <h2>Security Audit Logs</h2>
                <pre id="audit-logs" style="max-height: 500px; overflow-y: auto;">Loading...</pre>
            </div>
        </div>
    </div>

    <!-- Login Check Overlay -->
    <div id="admin-login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;">
        <div style="text-align: center;">
            <h2 style="color:#ff4d4d;">UNAUTHORIZED</h2>
            <p>You must be an Administrator to view this page.</p>
            <a href="/" class="btn">Return Home</a>
        </div>
    </div>

    <script src="admin.js?v=2"></script>
</body>
</html>
